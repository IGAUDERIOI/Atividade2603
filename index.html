<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>

        let idPessoaEdit = 0;

        function carregarPessoas() {
            const tabelaBody = document.getElementById('tabela-body');

            tabelaBody.innerHTML = '<tr><td colspan="3">Buscando dados...</td></tr>';

            axios.get('http://localhost:8080/pessoas/listar').then(resposta => {
                if (resposta.status === 200) {
                    tabelaBody.innerHTML = '';

                    const pessoas = resposta.data;

                    for (const pessoa of pessoas) {
                        const linha = document.createElement('tr');

                        linha.innerHTML = `
                            <td class="acoes">
                                <button onclick="excluirPessoa(${pessoa.id})">Excluir</button>
                            </td>
                            <td>${pessoa.id}</td>
                            <td>${pessoa.nome}</td>
                            <td>${pessoa.sobrenome}</td>
                        `;

                        tabelaBody.appendChild(linha);
                    }
                }
            })
            .catch(erro => {
                console.error('Erro na requisição:', erro);
                tabelaBody.innerHTML = `<tr><td colspan="3">Erro na requisição: ${erro}</td></tr>`;
            })

        }

        function manutencaoPessoa() {
            const nome = document.getElementById('input-nome').value;
            const sobrenome = document.getElementById('input-sobrenome').value;

            if (!nome || !sobrenome) {
                return;
            }

            const dados = {
                nome,
                sobrenome,
            };

            axios.post("http://localhost:8080/pessoas/criar", dados, {
                headers: {
                    'Content-Type': 'application/json',
                }
            }).then(resposta => {
                if(resposta.status === 201) {
                    alert("Registro criado com sucesso, ID: " + resposta.data.id);
                    carregarPessoas();
                }
            })
            .catch(erro => {
                console.error('Erro na requisição:', erro);
            })
        }

        function editarPessoa(id) {
            idPessoaEdit = id;

            document.getElementById('input-nome').value;
            document.getElementById('input-sobrenome').value;
        }

        function excluirPessoa(id) {
            
            const confirmacao = confirm("Você tem certeza que excluir essa pessoa?");

            if(confirmacao) {
                axios.post("http://localhost:8080/pessoas/deletar/" + id).then(resposta => {
                    if(resposta.status === 200) {
                        alert("Registro deletado com sucesso, ID: " + id);
                        carregarPessoas();
                    }
                })
                .catch(erro => {
                    console.error('Erro na requisição:', erro);
                })
            }
        }
    </script>
</head>

<body onload="carregarPessoas()">
    <div class="container">
        <div class="container-cadastro">
            <div class="campo">
                <label for="input-nome">Nome:</label>
                <input type="text" id="input-nome">
            </div>
            <div class="campo">
                <label for="input-sobrenome">Sobrenome:</label>
                <input type="text" id="input-sobrenome">
            </div>

            <div class="botoes">
                <button onclick="manutencaoPessoa()">Salvar</button>
            </div>
        </div>

        <div class="container-tabela">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Sobrenome</th>
                    </tr>
                </thead>
                <tbody id="tabela-body"></tbody>
            </table>
        </div>
    </div>

</body>

</html>
